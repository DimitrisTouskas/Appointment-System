services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: schemaDB
    volumes:
      - ./database/schemaDB.sql:/docker-entrypoint-initdb.d/schemaDB.sql