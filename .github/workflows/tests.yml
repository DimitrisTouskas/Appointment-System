name: Tests

on: push

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: schemaDB_test
        ports:
          -  3306:3306
        options: --health-cmd="mysqladmin ping -h localhost" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli
      - run: composer install
      - run: mysql -h127.0.0.1 -uroot -proot schemaDB_test < database/schemaDB.sql
      - run: echo "DB_HOST=127.0.0.1" >> .env
      - run: echo "DB_NAME=schemaDB" >> .env
      - run: echo "DB_USERNAME=root" >> .env
      - run: echo "DB_PASSWORD=root" >> .env
      - run: vendor/bin/phpunit